[tool.ruff]
line-length = 88

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint]
select = ["E", "F", "B"] # 檢查語法錯誤 (E/F) 與 常見 Bug (B) // 其他type要確定

[tool.mypy]
python_version = "3.10"
warn_return_any = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["test"]
pythonpath = ["src"] # 確保測試時能抓到 src 底下的模組